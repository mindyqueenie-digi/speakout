<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakOut with Mindy - CALC 訓練器</title>
    <style>
        :root {
            --primary-blue: #1e2a47; 
            --accent-gold: #d4af37; 
            --gold-gradient: linear-gradient(135deg, #e6c96a, #d4af37);
            --bg-card: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--primary-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }

        /* 成長進度條 */
        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            position: fixed; top: 0; left: 0;
        }
        #progressBar {
            width: 0%; height: 100%; background: var(--gold-gradient);
            transition: width 0.3s;
        }

        .card-container {
            background-color: var(--bg-card);
            padding: 25px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; max-width: 500px; width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
        }

        .mibi-wrapper { height: 120px; margin-bottom: 10px; }
        .mibi-img { height: 100%; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .category-tag {
            background: var(--gold-gradient); color: var(--primary-blue);
            padding: 6px 18px; border-radius: 20px;
            font-size: 0.85em; font-weight: bold; display: inline-block;
        }

        .chinese-text {
            font-size: 1.5rem; font-weight: bold; margin: 20px 0;
            color: var(--primary-blue); line-height: 1.5; min-height: 3em;
        }

        .english-text {
            font-size: 1.3rem; color: var(--accent-gold);
            margin: 15px 0; display: none; padding: 20px;
            background-color: #fdfaf0; border-radius: 15px;
            border: 1px dashed var(--accent-gold);
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        
        button { border: none; padding: 16px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        .btn-main { background: var(--gold-gradient); color: var(--primary-blue); width: 100%; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        
        .nav-btns { display: flex; gap: 10px; }
        .btn-nav { background: #f0f2f5; color: #666; flex: 1; }
        .btn-next { background: var(--primary-blue); color: white; flex: 2; }

        /* 錄音與語音控制區 */
        .control-panel { display: none; margin-bottom: 15px; }
        .voice-btn {
            background: white; border: 1px solid #ddd; padding: 8px 12px;
            font-size: 0.8em; border-radius: 8px; margin: 0 4px;
        }
        .record-btn { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .record-active { background: #cf1322; color: white; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div class="progress-container"><div id="progressBar"></div></div>

    <div class="card-container">
        <div class="mibi-wrapper">
            <img id="mibi" class="mibi-img" src="mibi_listen.jpg">
        </div>

        <div id="categoryDisplay" class="category-tag">語思 CALC 訓練</div>
        <div id="progressText" style="font-size: 0.8em; color: #999; margin: 10px 0;">Question 1 / 80</div>
        
        <div class="chinese-text" id="question">載入中...</div>
        <div class="english-text" id="answer"></div>

        <div id="controlPanel" class="control-panel">
            <div style="margin-bottom: 10px;">
                <button class="voice-btn" onclick="speak('en-US')">🇺🇸 美音</button>
                <button class="voice-btn" onclick="speak('en-GB')">🇬🇧 英音</button>
                <button class="voice-btn" onclick="speak('en-AU')">🇦🇺 澳音</button>
            </div>
            <button id="recBtn" class="voice-btn record-btn" onclick="toggleRecord()">🎙️ 錄下我的發音</button>
            <button id="playRecBtn" class="voice-btn" onclick="playRecord()" style="display:none;">▶️ 聽我的錄音</button>
        </div>

        <div class="btn-group">
            <button onclick="showAnswer()" id="revealBtn" class="btn-main">看英文 Show Answer</button>
            <div class="nav-btns">
                <button onclick="prevQuestion()" class="btn-nav">◀</button>
                <button onclick="nextQuestion()" id="nextBtn" class="btn-next" style="display:none;">下一題 Next ▶</button>
            </div>
        </div>
    </div>

    <script>
        // ... 此處省略之前的 allQuestions 陣列 (請保留您之前貼過來的 80 題數據) ...
        const questions = [
            { cat: "🗣️ 情境一", zh: "很高興認識你。", en: "Pleased to meet you." },
            // ... (請將您之前的 80 題數據完整放在這裡) ...
        ];

        let currentIndex = 0;
        let mediaRecorder;
        let audioChunks = [];

        function updateCard() {
            const q = questions[currentIndex];
            document.getElementById('question').textContent = q.zh;
            document.getElementById('answer').textContent = q.en;
            document.getElementById('categoryDisplay').textContent = q.cat;
            document.getElementById('progressText').textContent = `Question ${currentIndex + 1} / ${questions.length}`;
            
            // 更新進度條
            const prog = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = prog + '%';

            // 重置介面
            document.getElementById('answer').style.display = 'none';
            document.getElementById('controlPanel').style.display = 'none';
            document.getElementById('revealBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('mibi').src = 'mibi_listen.jpg';
            document.getElementById('playRecBtn').style.display = 'none';
        }

        function showAnswer() {
            document.getElementById('answer').style.display = 'block';
            document.getElementById('controlPanel').style.display = 'block';
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('mibi').src = 'mibi_happy.jpg';
            document.getElementById('mibi').style.transform = "scale(1.2) rotate(5deg)";
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function speak(lang) {
            const msg = new SpeechSynthesisUtterance(questions[currentIndex].en);
            msg.lang = lang;
            msg.rate = 0.8;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // 簡單錄音功能
        async function toggleRecord() {
            const btn = document.getElementById('recBtn');
            if (btn.classList.contains('record-active')) {
                mediaRecorder.stop();
                btn.classList.remove('record-active');
                btn.textContent = '🎙️ 重新錄音';
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    window.currentRecording = audio;
                    document.getElementById('playRecBtn').style.display = 'inline-block';
                };
                mediaRecorder.start();
                btn.classList.add('record-active');
                btn.textContent = '⏹️ 停止錄音';
            }
        }

        function playRecord() {
            if (window.currentRecording) window.currentRecording.play();
        }

        updateCard();
    </script>
</body>
</html>
